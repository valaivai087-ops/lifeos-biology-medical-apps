    .ai-content { line-height: 1.6; color: #333; font-size: 12px; }

    .ai-content li { margin-left: 16px; margin-bottom: 5px; }
    .card { background: var(--light-bg); border-left: 4px solid var(--teal); padding: 12px; margin: 8px 0; border-radius: 6px; cursor: pointer; }
    .card-header { font-weight: bold; color: var(--navy); display: flex; justify-content: space-between; font-size: 12px; }

    table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 11px; }
    th, td { padding: 6px; text-align: left; border: 1px solid #ddd; }
    th { background: var(--navy); color: white; font-weight: 600; }
    tr:nth-child(even) { background: var(--light-bg); }
    @media (max-width: 1024px) { .container { flex-direction: column; } aside { width: 100%; max-height: none; position: relative; top: 0; } main { max-height: none; } }

    const chapters = chaptersData.map((ch, i) => ({ id: i, number: i + 1, icon: ["🔬", "🚪", "🧬", "⚡", "☀️", "♻️", "🔄", "👯", "🧮", "🔗", "🧪", "🌍", "📈", "🌳", "🔗"][i], ...ch }));
    
    let userProgress = JSON.parse(localStorage.getItem('bioProgress2')) || { chapters: [] };

    function init() {
      renderSidebar();
      renderChapters();
      updateStats();
    }

    function renderSidebar() {
      const list = document.getElementById('chapterList');
      list.innerHTML = chapters.map((ch, i) => `
        <button class="chapter-btn ${userProgress.chapters.includes(i) ? 'active' : ''}" onclick="jumpTo(${i})" title="${ch.title}">
          ${ch.icon} ${ch.number}. ${ch.title.substring(0, 11)}...
        </button>
      `).join('');
    }

    function renderChapters() {
      const container = document.getElementById('chapterContainer');
      container.innerHTML = chapters.map((ch, i) => `
        <section id="ch-${i}" class="section-hidden">
          <h1>${ch.icon} ${ch.number}. ${ch.title}</h1>
          <div class="meta">📌 ${ch.ankiCards.length} Anki卡片 | ${ch.aiQA.length} Q&A | ${ch.aiQuiz.length} 模擬題</div>
          
          <div class="tabs">
            <button class="tab-btn active" onclick="switchTab(event, 'v-${i}')">📐 圖</button>
            <button class="tab-btn" onclick="switchTab(event, 'a-${i}')">🧠 卡</button>
            <button class="tab-btn" onclick="switchTab(event, 'ai-${i}')">🤖 內</button>
          </div>

          <div id="v-${i}" class="tab-content active"><div class="diagram-container">${ch.visualizations}</div></div>

          <div id="a-${i}" class="tab-content"><h2>🧠 Anki (${ch.ankiCards.length})</h2>${ch.ankiCards.map((c, j) => `<div class="flashcard" onclick="this.classList.toggle('flipped')"><div class="flashcard-inner"><div class="flashcard-front">${c.f}</div><div class="flashcard-back">${c.b}</div></div></div><div class="flashcard-hint">${j+1}/${ch.ankiCards.length}</div>`).join('')}</div>

          <div id="ai-${i}" class="tab-content"><h2>🤖 AI內容</h2><div class="ai-section"><div class="ai-title">📖 講解</div><div class="ai-content">${ch.aiExplanation}</div></div><div class="ai-section"><div class="ai-title">💬 Q&A (${ch.aiQA.length})</div>${ch.aiQA.map(q => `<div style="margin:10px 0;"><strong style="color:var(--navy);">Q. ${q.q}</strong><p style="margin:6px 0;color:#333;">A. ${q.a}</p></div>`).join('')}</div><div class="ai-section"><div class="ai-title">📝 模擬 (${ch.aiQuiz.length})</div>${ch.aiQuiz.map((q, j) => `<div class="question-card"><div class="question-text">【${j+1}】${q.q}</div><div class="options">${q.opts.map((o, k) => `<div class="option" onclick="checkAns(this,${k},${q.ans})">選${String.fromCharCode(65+k)}. ${o}</div>`).join('')}</div></div>`).join('')}</div><div class="ai-section"><div class="ai-title">📄 摘要</div><div class="ai-content">${ch.aiSummary}</div></div></div>
        </section>
      `).join('');
    }

    function jumpTo(i) {
      document.querySelectorAll('section').forEach(s => s.classList.add('section-hidden'));
      document.getElementById(`ch-${i}`).classList.remove('section-hidden');
      document.getElementById('home').classList.add('section-hidden');
      document.querySelectorAll('.chapter-btn').forEach((b, j) => b.classList.toggle('active', j === i));
      if (!userProgress.chapters.includes(i)) userProgress.chapters.push(i);
      localStorage.setItem('bioProgress2', JSON.stringify(userProgress));
      updateStats();
    }

    function switchTab(e, id) {
      const tabs = e.target.closest('.tabs').parentElement;
      tabs.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      tabs.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      e.target.classList.add('active');
      document.getElementById(id).classList.add('active');
    }

    function checkAns(el, sel, cor) {
      const sibs = el.parentElement.querySelectorAll('.option');
      sibs.forEach(s => s.classList.remove('correct', 'incorrect'));
      if (sel === cor) el.classList.add('correct');
      else { el.classList.add('incorrect'); sibs[cor].classList.add('correct'); }
    }

    function toggleCard(c) { c.classList.toggle('expanded'); }

    function updateStats() {
      document.getElementById('progress').textContent = Math.round(userProgress.chapters.length / chapters.length * 100) + '%';
    }

    init();
